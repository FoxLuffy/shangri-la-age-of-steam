name: Publish Artifacts

on:
  workflow_dispatch:
    description: "Publish project artifacts"
    inputs:
      environment:
        description: "Deployment environment"
        default: "production"
        type: choice
        options:
          - production
          - staging

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write # 1. Added permission to allow pushing to GHCR
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Backend Dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r backend/requirements.txt

      # 2. Convert repository name to lowercase to prevent Docker format errors
      - name: Lowercase Repository Name
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      # 3. Tag images with the full ghcr.io path
      - name: Build Backend Image
        run: docker build -t ghcr.io/${{ env.REPO_LOWER }}/backend:latest -f Dockerfile.backend .

      - name: Build Frontend Image
        run: docker build --build-arg VITE_BACKEND_URL=https://api.saos.atelierbungle.org -t ghcr.io/${{ env.REPO_LOWER }}/frontend:latest -f Dockerfile.frontend .

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Push the correctly prefixed images
      - name: Push Images
        run: |
          docker push ghcr.io/${{ env.REPO_LOWER }}/backend:latest
          docker push ghcr.io/${{ env.REPO_LOWER }}/frontend:latest
