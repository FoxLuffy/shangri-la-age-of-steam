version: "3.8"

services:
  backend:
    image: ${PROJECT_NAME:-shangri-la}/shangri-la-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: shangri-la-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - BACKEND_PORT=${BACKEND_PORT:-8000}
      - VLLM_API_KEY=${VLLM_API_KEY}
      - VLLM_API_BASE=${VLLM_API_BASE:-http://localhost:8000/v1}
    volumes:
      - ${SAOS_DATA_DIR:-./saos_data}:/data

  frontend:
    image: ${PROJECT_NAME:-shangri-la}/shangri-la-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: shangri-la-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - FRONTEND_PORT=${FRONTEND_PORT:-5173}
    volumes:
      - ${SAOS_DATA_DIR:-./saos_data}:/data