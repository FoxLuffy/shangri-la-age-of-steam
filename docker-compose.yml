version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: ${PROJECT_NAME:-shangri-la}/shangri-la-backend:latest
    container_name: shangri-la-backend
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      - BACKEND_PORT=8003
      - VLLM_API_KEY=${VLLM_API_KEY}
      - VLLM_SERVER_URL=http://${TRUENAS_HOST_IP}:${VLLM_PORT}
      - DATABASE_PATH=/data/saos.db
    volumes:
      - /mnt/tank/saos_data:/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: ${PROJECT_NAME:-shangri-la}/shangri-la-frontend:latest
    container_name: shangri-la-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      - FRONTEND_PORT=5173
      - VLLM_SERVER_URL=http://${TRUENAS_HOST_IP}:${VLLM_PORT}
      - VITE_BACKEND_URL=http://localhost:8003
    volumes:
      - /mnt/tank/saos_data:/data