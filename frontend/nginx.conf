server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets (JS, CSS, images) can be cached forever because Vite hashes them
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Everything else, including index.html, MUST NOT be cached
    # This guarantees that new builds are instantly delivered to users
    location / {
        try_files $uri $uri/ /index.html;
        
        # Kill cache for index.html
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }
}
